AWSTemplateFormatVersion: 2010-09-09

Description: "Route53 A record for a cluster subdomain"

Parameters:
  Domain:
    Type: String
    Description: "The base domain of the cluster"
  PublicCluster:
    Type: String
    Description: "The subdomain of the cluster"
  PublicIp:
    Type: String
    Description: "The public IPv4 address"

Resources:
  OrgARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub "${Domain}."
      Name: !Sub "${PublicCluster}.${Domain}"
      Type: A
      TTL: "300"
      ResourceRecords:
        - !Ref PublicIp
