type: object
required:
  - cluster
  - node_capacity
  - ttl
properties:
  cluster:
    type: string
    pattern: '^[A-Za-z0-9-_]+$'
    maxLength: 40
    description: >
      Name of the cluster to deploy. Must not be a system keyword
      (login, provisioner, client, recorder, runner, mcp, sliderule, monitor).
    example: developers
  node_capacity:
    type: integer
    minimum: 1
    maximum: 100
    description: Number of processing nodes to provision.
    example: 4
  ttl:
    type: integer
    minimum: 15
    description: >
      Time to live in minutes before automatic shutdown.
      Members max 720 (12 hours), owners max 525600 (1 year).
    example: 60
  is_public:
    type: boolean
    default: false
    description: Whether the cluster should be publicly accessible.
  version:
    type: string
    default: latest
    description: Container image version to deploy.
    example: latest
