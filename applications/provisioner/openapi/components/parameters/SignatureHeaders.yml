XSlideruleTimestamp:
  name: X-Sliderule-Timestamp
  in: header
  required: false
  description: >
    Unix timestamp (seconds since epoch) of when the request was signed.
    Required for owner-level operations.
  schema:
    type: string

XSlideruleSignature:
  name: X-Sliderule-Signature
  in: header
  required: false
  description: >
    Base64-encoded signature of the canonical request string.
    Required for owner-level operations.
  schema:
    type: string
