post:
  operationId: deploy
  summary: Deploy a cluster
  description: >
    Creates a new SlideRule processing cluster via CloudFormation. Provisions
    an intelligent load balancer, monitor, and processing nodes.
  parameters:
    - $ref: '../components/parameters/SignatureHeaders.yml#/XSlideruleTimestamp'
    - $ref: '../components/parameters/SignatureHeaders.yml#/XSlideruleSignature'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/DeployRequest.yml'
  responses:
    '200':
      description: Deployment initiated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/DeployResponse.yml'
    '403':
      $ref: '../components/responses/Forbidden.yml'
    '500':
      $ref: '../components/responses/InternalError.yml'
