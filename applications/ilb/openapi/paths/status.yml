  description: Returns the number of registered nodes for a service.
  operationId: status
  tags:
    - Public
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../components/schemas/StatusRequest.yml'
  responses:
    '200':
      description: Cluster status.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/StatusResponse.yml'
