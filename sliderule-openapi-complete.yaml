  /arrow/casals1bx:
    post:
      operationId: processCASALS1Bx
      summary: "CASALS L1B geolocated returns (Parquet)"
      description: |
        Response: CASALS1bxResponseColumns.
      tags: [CASALS]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProcessingRequest" }
      responses:
        "200": { $ref: "#/components/responses/ParquetResponse" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServerBusy" }

  # ── HDF5 Data Access ──
  /source/h5:
    post:
      operationId: readH5Dataset
      summary: "Read single HDF5 dataset (streaming)"
      description: |
        Reads a single dataset from an HDF5 file with optional row/column slicing.
        Returns binary serialized h5dataset records.
      tags: [HDF5]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset, resource, dataset]
              properties:
                asset: { type: string, description: "Registered asset name" }
                resource: { type: string, description: "HDF5 file path or URL" }
                dataset: { type: string, description: "Dataset path within HDF5 file" }
                datatype: { type: integer, description: "RecordObject data type (0=DYNAMIC)" }
                col: { type: integer, default: 0 }
                startrow: { type: integer, default: 0 }
                numrows: { type: integer, default: -1, description: "-1 for all rows" }
                id: { type: integer, default: 0 }
      responses:
        "200": { $ref: "#/components/responses/StreamingResponse" }

  /source/h5p:
    post:
      operationId: readH5File
      summary: "Read multiple HDF5 datasets from one file (streaming)"
      description: |
        Reads multiple datasets from a single HDF5 file with slice specifications.
      tags: [HDF5]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [asset, resource, datasets]
              properties:
                asset: { type: string }
                resource: { type: string }
                datasets:
                  type: array
                  items:
                    type: object
                    properties:
                      dataset: { type: string }
                      col: { type: integer }
                      startrow: { type: integer }
                      numrows: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/StreamingResponse" }

  /source/h5x:
    post:
      operationId: readH5Extended
      summary: "Read HDF5 groups as Parquet DataFrame"
      description: |
        Creates DataFrames from HDF5 groups and outputs as Parquet.
        Supports geo-indexing and raster sampling.
      tags: [HDF5]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                asset: { type: string }
                resource: { type: string }
                parms:
                  type: object
                  description: "Must include output/arrow parameters"
      responses:
        "200": { $ref: "#/components/responses/ParquetResponse" }
        "503": { $ref: "#/components/responses/ServerBusy" }

  # ── Geospatial Utilities ──
  /source/samples:
    post:
      operationId: sampleRaster
      summary: "Sample raster values at coordinates"
      description: |
        Sample one or more raster datasets at specified lat/lon coordinates.
        Returns JSON with sampled values.
      tags: [Geospatial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                samples: { type: object, description: "Raster sampling parameters (asset, algorithm, etc.)" }
                coordinates:
                  type: array
                  items: { type: array, items: { type: number } }
                  description: "Array of [lon, lat] or [lon, lat, height] coordinate arrays"
      responses:
        "200":
          description: Sampled values
          content:
            application/json:
              schema:
                type: object
                properties:
                  samples: { type: array, items: { type: number } }
                  errors: { type: array, items: {} }

  /source/subsets:
    post:
      operationId: subsetRaster
      summary: "Extract raster subsets by bounding box"
      description: |
        Extract raster data for specified bounding boxes.
      tags: [Geospatial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subsets: { type: object, description: "Raster parameters" }
                extents:
                  type: array
                  items: { type: array, items: { type: number }, minItems: 4, maxItems: 4 }
                  description: "Array of [xmin, ymin, xmax, ymax] bounding boxes"
      responses:
        "200": { $ref: "#/components/responses/JSONResponse" }

  /source/geo:
    post:
      operationId: geoTransform
      summary: "Coordinate transformations and spatial operations"
      description: |
        Coordinate conversions, polygon splitting, intersection, spatial index operations.
      tags: [Geospatial]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { $ref: "#/components/responses/JSONResponse" }

  # ── Server Utilities ──
  /source/time:
    get:
      operationId: convertTime
      summary: "Time format conversion"
      description: |
        Converts between GPS, GMT, DATE, CDS time formats.
      tags: [Utilities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                time: { type: number, description: "Time value to convert" }
                input: { type: string, enum: [GPS, GMT, DATE, CDS, NOW] }
                output: { type: string, enum: [GPS, GMT, DATE, CDS] }
      responses:
        "200": { $ref: "#/components/responses/JSONResponse" }

  /source/event:
