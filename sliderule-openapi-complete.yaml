tags:
  - name: Discovery
    description: Schema discovery and server status
  - name: ICESat-2
    description: ICESat-2 Parquet/DataFrame APIs (x-series)
  - name: ICESat-2 Streaming
    description: |
      ICESat-2 streaming record APIs (s/p-series). Returns binary serialized
      RecordObjects — requires the SlideRule Python client to decode.
      AI agents should use the /arrow/* Parquet endpoints instead.
  - name: GEDI
    description: GEDI Parquet/DataFrame APIs (x-series)
  - name: GEDI Streaming
    description: |
      GEDI streaming record APIs. Returns binary serialized RecordObjects —
      requires the SlideRule Python client. AI agents should use /arrow/* instead.
  - name: SWOT
    description: SWOT APIs
  - name: CASALS
    description: CASALS APIs
  - name: HDF5
    description: Direct HDF5 data access
  - name: Geospatial
    description: Raster sampling and spatial utilities
  - name: Utilities
    description: Server utilities and data discovery
  - name: Admin
    description: Administrative endpoints (require authentication)
